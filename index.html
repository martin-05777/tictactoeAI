<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity TTT - Social Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-global.js"></script>
    <style>
        :root { --blue: #00d4ff; --red: #ff4757; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: var(--card); padding: 25px; border-radius: 20px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; outline: none; }
        input:focus { border-color: var(--blue); }
        .btn { background: var(--blue); color: black; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; margin-top: 10px; }
        .btn:hover { transform: scale(1.03); filter: brightness(1.1); }
        
        .friend-list { list-style: none; padding: 0; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .friend-item { background: #2a2a2a; padding: 12px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue); }
        
        /* Game Board Styles */
        #game-area { display: none; text-align: center; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin: 20px auto; }
        .cell { width: 100px; height: 100px; background: #2a2a2a; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; border: 1px solid #444; transition: 0.2s; }
        .cell:hover { background: #333; }
        .cell.X { color: var(--blue); text-shadow: 0 0 10px rgba(0,212,255,0.5); }
        .cell.O { color: var(--red); text-shadow: 0 0 10px rgba(255,71,87,0.5); }
        .cell.next-off { opacity: 0.25; filter: blur(1px); }
        #status { font-weight: bold; margin-bottom: 10px; font-size: 1.3rem; min-height: 1.5em; }
    </style>
</head>
<body>

    <div class="box" id="lobby-ui">
        <h2 style="letter-spacing: 2px;">INFINITY TTT</h2>
        
        <div id="setup-area">
            <p style="color: #888;">Create a profile to play:</p>
            <input type="text" id="username-input" placeholder="Your Nickname">
            <button class="btn" onclick="initUser()">Create Profile</button>
        </div>

        <div id="social-area" style="display: none;">
            <p>Hello, <b id="display-name" style="color: var(--blue);"></b>!</p>
            <div style="border-top: 1px solid #333; margin: 15px 0;"></div>
            <input type="text" id="search-friend" placeholder="Search Nickname...">
            <button class="btn" onclick="addFriend()">Add Friend</button>
            
            <h4 style="margin: 20px 0 10px 0; text-align: left;">Friends List</h4>
            <ul id="friend-list-ui" class="friend-list"></ul>
        </div>
    </div>

    <div id="game-area">
        <div id="status">Waiting...</div>
        <div class="board" id="board">
            <div class="cell" onclick="handleMove(0)"></div>
            <div class="cell" onclick="handleMove(1)"></div>
            <div class="cell" onclick="handleMove(2)"></div>
            <div class="cell" onclick="handleMove(3)"></div>
            <div class="cell" onclick="handleMove(4)"></div>
            <div class="cell" onclick="handleMove(5)"></div>
            <div class="cell" onclick="handleMove(6)"></div>
            <div class="cell" onclick="handleMove(7)"></div>
            <div class="cell" onclick="handleMove(8)"></div>
        </div>
        <button class="btn" style="background: #444; color: white;" onclick="exitGame()">Leave Match</button>
    </div>

    <script>
        // --- 1. FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAt_qIzv2o23gdbNXIjPI_25vC9Ar-wuWo",
            authDomain: "tictactoe-ae351.firebaseapp.com",
            databaseURL: "https://tictactoe-ae351-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "tictactoe-ae351",
            storageBucket: "tictactoe-ae351.firebasestorage.app",
            messagingSenderId: "283214751508",
            appId: "1:283214751508:web:282f440b28862af7838401",
            measurementId: "G-T4ZW6WDQY3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myName = "", myID = "", currentGameID = "", mySymbol = "";
        let isMyTurn = false, board = Array(9).fill(""), moves = { X:[], O:[] };

        // --- 2. SOCIAL & PROFILE LOGIC ---
        function initUser() {
            myName = document.getElementById('username-input').value.trim();
            if (!myName) return alert("Please enter a name!");
            myID = 'id_' + Math.floor(Math.random() * 1000000);
            
            // Save nickname to global directory so others can find you
            db.ref('directory/' + myName).set(myID);
            
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('social-area').style.display = 'block';
            document.getElementById('display-name').innerText = myName;
            
            listenForInvites();
            renderFriends();
        }

        function addFriend() {
            const target = document.getElementById('search-friend').value.trim();
            if (target === myName) return alert("You can't add yourself!");
            
            db.ref('directory/' + target).once('value', snapshot => {
                if(snapshot.exists()) {
                    let friends = JSON.parse(localStorage.getItem('ttt_friends') || '{}');
                    friends[target] = snapshot.val();
                    localStorage.setItem('ttt_friends', JSON.stringify(friends));
                    document.getElementById('search-friend').value = "";
                    renderFriends();
                } else {
                    alert("User '" + target + "' not found!");
                }
            });
        }

        function renderFriends() {
            const friends = JSON.parse(localStorage.getItem('ttt_friends') || '{}');
            const ui = document.getElementById('friend-list-ui');
            ui.innerHTML = "";
            for(let name in friends) {
                ui.innerHTML += `<li class="friend-item">
                    <span>${name}</span>
                    <button class="btn" style="width:auto; margin:0; padding: 5px 15px;" onclick="invite('${friends[name]}')">Play</button>
                </li>`;
            }
        }

        function invite(friendID) {
            const gid = myID + "_" + friendID;
            db.ref('invites/' + friendID).set({ from: myName, fromID: myID, gid: gid });
            alert("Invitation sent! Waiting for acceptance...");
            startGame(gid, "X");
        }

        function listenForInvites() {
            db.ref('invites/' + myID).on('value', snapshot => {
                const data = snapshot.val();
                if(data) {
                    if(confirm(data.from + " challenged you! Accept?")) {
                        db.ref('invites/' + myID).remove();
                        startGame(data.gid, "O");
                    } else {
                        db.ref('invites/' + myID).remove();
                    }
                }
            });
        }

        // --- 3. INFINITY TIC-TAC-TOE GAME LOGIC ---
        function startGame(gid, symbol) {
            currentGameID = gid;
            mySymbol = symbol;
            isMyTurn = (symbol === "X");
            board = Array(9).fill("");
            moves = { X:[], O:[] };
            
            document.getElementById('lobby-ui').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            
            // Listen for moves from the other player
            db.ref('games/' + gid).on('value', snapshot => {
                const data = snapshot.val();
                if(data && data.lastMover !== myID) {
                    board = data.board;
                    moves = data.moves;
                    isMyTurn = true;
                    updateUI();
                    checkWinner();
                }
            });
            updateUI();
        }

        function handleMove(idx) {
            if(!isMyTurn || board[idx] !== "" || !currentGameID) return;
            
            // Infinity Rule: Remove 4th move
            if(moves[mySymbol].length === 3) {
                const oldest = moves[mySymbol].shift();
                board[oldest] = "";
            }
            
            board[idx] = mySymbol;
            moves[mySymbol].push(idx);
            isMyTurn = false;
            
            updateUI();
            db.ref('games/' + currentGameID).set({ 
                board: board, 
                moves: moves, 
                lastMover: myID 
            });
            checkWinner();
        }

        function updateUI() {
            const cells = document.querySelectorAll('.cell');
            board.forEach((val, i) => {
                cells[i].innerText = val;
                cells[i].className = 'cell ' + (val || '');
                
                // Highlight the piece that will disappear next
                let nextToFade = isMyTurn ? mySymbol : (mySymbol === 'X' ? 'O' : 'X');
                if (moves[nextToFade].length === 3 && moves[nextToFade][0] === i) {
                    cells[i].classList.add('next-off');
                }
            });
            
            const statusEl = document.getElementById('status');
            statusEl.innerText = isMyTurn ? "Your Turn (" + mySymbol + ")" : "Opponent's Turn...";
            statusEl.style.color = isMyTurn ? (mySymbol === 'X' ? 'var(--blue)' : 'var(--red)') : '#777';
        }

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let w of wins) {
                if (board[w[0]] && board[w[0]] === board[w[1]] && board[w[0]] === board[w[2]]) {
                    setTimeout(() => {
                        alert(board[w[0]] + " WINS THE MATCH!");
                        exitGame();
                    }, 100);
                    return true;
                }
            }
            return false;
        }

        function exitGame() {
            if(currentGameID) db.ref('games/' + currentGameID).off();
            location.reload();
        }
    </script>
</body>
</html>
